<!DOCTYPE html>
<html>
<head>
<title>English Quiz</title>
<style>
body { font-family: Arial; text-align: center; background: #f2f2f2; }
.container { background: white; padding: 20px; margin: 50px auto; width: 350px; border-radius: 10px; }
button { display: block; margin: 10px auto; padding: 10px; width: 100%; }
</style>
</head>
<body>

<div class="container">
<h2>English Quiz</h2>
<p id="question">1. What is the past of "go"?</p>

<button onclick="checkAnswer('a')">goed</button>
<button onclick="checkAnswer('b')">went</button>
<button onclick="checkAnswer('c')">goes</button>

<p id="result"></p>
<p id="score">Score: 0</p>
</div>

<script>
let score = 0;
let current = 0;

const questions = [
  {q:"What is the past of 'go'?", a:["goed","went","goes"], correct:"went"},
  {q:"Choose the correct article: ___ apple a day keeps the doctor away.", a:["An","A","The"], correct:"An"},
  {q:"Synonym of 'happy'?", a:["sad","joyful","angry"], correct:"joyful"},
  {q:"Plural of 'child'?", a:["childs","children","childes"], correct:"children"},
  {q:"Which is correct? 'I ___ a book yesterday.'", a:["reads","read","reading"], correct:"read"}
];

function checkAnswer(answer) {
  if(answer === questions[current].correct){
    document.getElementById("result").innerHTML = "Correct!";
    score++;
  } else {
    document.getElementById("result").innerHTML = "Wrong!";
  }

  current++;
  if(current < questions.length){
    showQuestion();
  } else {
    document.getElementById("question").innerHTML = "Quiz Finished!";
    document.getElementById("result").innerHTML = "Your final score: " + score + "/" + questions.length;
    document.querySelectorAll("button").forEach(b => b.style.display = "none");
  }

  document.getElementById("score").innerHTML = "Score: " + score;
}

function showQuestion(){
  document.getElementById("question").innerHTML = questions[current].q;
  let buttons = document.querySelectorAll("button");
  buttons[0].innerHTML = questions[current].a[0];
  buttons[1].innerHTML = questions[current].a[1];
  buttons[2].innerHTML = questions[current].a[2];
}

</script>

</body>
</html>
